services:
  - type: web
    name: composite-behavioral-modeling
    env: python
    plan: free
    # Added "cd composite_behavioral_modeling &&" to the commands
    buildCommand: pip install -r requirements.txt && cd composite_behavioral_modeling && python manage.py migrate && python manage.py collectstatic --noinput
    # Told gunicorn where the wsgi file is relative to the root
    startCommand: gunicorn --pythonpath composite_behavioral_modeling composite_behavioral_modeling.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
